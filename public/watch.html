<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NovaPlay Player</title>
<style>
html, body { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; }
#player { width:100vw; height:100vh; background:#000; display:flex; align-items:center; justify-content:center; }
iframe, video { width:100vw; height:100vh; border:0; display:block; background:#000; }
#hint { position:fixed; inset:auto 12px 12px auto; color:#fff; font:14px/1.3 Arial, sans-serif; background:rgba(0,0,0,0.6); padding:8px 10px; border-radius:6px; display:none; }
#status { position:fixed; inset:12px auto auto 12px; color:#fff; font:14px/1.3 Arial, sans-serif; background:rgba(0,0,0,0.6); padding:8px 10px; border-radius:6px; }
</style>
</head>
<body>
<div id="player"></div>
<div id="status">Loading...</div>
<div id="hint">Tap to enter fullscreen</div>

<script>
const params = new URLSearchParams(location.search)
const videoIdParam = params.get("id")
const autoFullscreen = params.get("fs") === "1"
const playerEl = document.getElementById("player")
const statusEl = document.getElementById("status")
const hintEl = document.getElementById("hint")
let nativeVideoEl = null

function showStatus(msg){ statusEl.textContent = msg || "" }
function hideStatus(){ statusEl.textContent = "" }

function isYouTubeStyleId(value){ return /^[A-Za-z0-9_-]{11}$/.test(String(value || "")) }

function requestFullscreen(target){
  if (!target) return false
  const req = target.requestFullscreen || target.webkitRequestFullscreen || target.msRequestFullscreen
  if (!req) return false
  try {
    const res = req.call(target)
    if (res && typeof res.catch === "function") res.catch(() => undefined)
    return true
  } catch { return false }
}

function scheduleFullscreen(target){
  if (!autoFullscreen) return
  hintEl.style.display = "block"
  const handler = () => {
    hintEl.style.display = "none"
    requestFullscreen(target)
    document.removeEventListener("click", handler, true)
    document.removeEventListener("keydown", handler, true)
  }
  document.addEventListener("click", handler, true)
  document.addEventListener("keydown", handler, true)
}

function enterFullscreen(target){
  if (!autoFullscreen) return
  if (!requestFullscreen(target)) scheduleFullscreen(target)
}

function renderIframe(src){
  playerEl.innerHTML = ""
  const iframe = document.createElement("iframe")
  iframe.src = src
  iframe.allowFullscreen = true
  iframe.setAttribute("allow", "autoplay; fullscreen")
  playerEl.appendChild(iframe)
  enterFullscreen(iframe)
}

function renderNative(src){
  playerEl.innerHTML = ""
  const video = document.createElement("video")
  video.controls = true
  video.autoplay = true
  video.playsInline = true
  video.src = src
  nativeVideoEl = video
  playerEl.appendChild(video)
  enterFullscreen(video)
}

async function fetchJson(url){
  const res = await fetch(url)
  const data = await res.json().catch(() => ({}))
  if (!res.ok) throw new Error(data.error || "Request failed")
  return data
}

async function init(){
  let id = String(videoIdParam || "").trim()
  if (id && !/^\d+$/.test(id)) {
    try {
      const list = await fetchJson("/api/videos")
      const match = Array.isArray(list) ? list.find(v => String(v._id) === id) : null
      if (match && match.id) {
        id = String(match.id)
      }
    } catch {}
  }
  if (!id) {
    try {
      const list = await fetchJson("/api/videos/trending")
      const first = Array.isArray(list) ? list.find(v => v._id || v.id) : null
      if (first) {
        id = String(first._id || first.id)
      }
    } catch {
      showStatus("Open this page from the server or provide ?id=VIDEO_ID")
      return
    }
  }

  try {
    const video = await fetchJson(`/api/video/${id}`)
    const source = String(video.source || "local").toLowerCase()
    const vid = String(video.videoId || "")

    if (isYouTubeStyleId(vid)) {
      renderIframe(`https://www.youtube.com/embed/${vid}?autoplay=1`)
      hideStatus()
      return
    }
    if (source === "vimeo" && vid) {
      renderIframe(`https://player.vimeo.com/video/${vid}`)
      hideStatus()
      return
    }
    if (source === "dailymotion" && vid) {
      renderIframe(`https://www.dailymotion.com/embed/video/${vid}`)
      hideStatus()
      return
    }
    if (video.playbackUrl) {
      renderNative(video.playbackUrl)
      hideStatus()
      return
    }

    showStatus("Unable to play video")
  } catch (err) {
    showStatus(`Load failed: ${err.message}`)
  }
}

init()
</script>
</body>
</html>
