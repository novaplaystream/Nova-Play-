<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NovaPlay Player</title>
<style>
:root { --bg:#000; --fg:#fff; --muted:rgba(255,255,255,0.7); }
html, body { margin:0; padding:0; width:100%; height:100%; background:var(--bg); color:var(--fg); overflow:hidden; font-family:Arial, sans-serif; }
#app { position:fixed; inset:0; background:#000; }
#player { position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; }
iframe, video { width:100vw; height:100vh; border:0; display:block; background:#000; }
#topbar { position:fixed; top:0; left:0; right:0; height:56px; display:flex; align-items:center; padding:0 16px; background:linear-gradient(180deg, rgba(0,0,0,0.75), rgba(0,0,0,0)); pointer-events:none; z-index:5; }
#logo { display:flex; align-items:center; gap:10px; font-weight:700; letter-spacing:0.5px; }
#logo img { height:28px; width:auto; }
#title { margin-left:14px; font-size:14px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:60vw; }
#status { position:fixed; top:64px; left:16px; background:rgba(0,0,0,0.6); padding:8px 10px; border-radius:6px; font-size:13px; z-index:6; }
#hint { position:fixed; right:16px; bottom:16px; background:rgba(0,0,0,0.6); padding:8px 10px; border-radius:6px; font-size:13px; z-index:6; display:none; }

#overlay { position:fixed; inset:0; background:rgba(0,0,0,0.86); display:none; z-index:7; }
#overlay.show { display:block; }
#overlayInner { position:absolute; inset:10% 6% 10% 6%; display:flex; flex-direction:column; }
#overlayTitle { font-size:20px; font-weight:700; margin-bottom:12px; }
#overlayList { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; overflow:auto; }
.overlayItem { position:relative; background:#111; border:1px solid #1f1f1f; border-radius:10px; overflow:hidden; cursor:pointer; }
.overlayItem img { width:100%; height:100%; object-fit:cover; display:block; aspect-ratio:16/9; }
.overlayMeta { position:absolute; left:0; right:0; bottom:0; padding:8px; background:linear-gradient(180deg, transparent, rgba(0,0,0,0.9)); font-size:12px; }
@media (max-width:1000px){ #overlayList { grid-template-columns:repeat(3,minmax(0,1fr)); } }
@media (max-width:700px){ #overlayList { grid-template-columns:repeat(2,minmax(0,1fr)); } }
</style>
</head>
<body>
<div id="app">
  <div id="player"></div>
  <div id="topbar">
    <div id="logo">
      <img src="/assets/novaplay-logo.svg" alt="NovaPlay">
      <span>NovaPlay</span>
      <span id="title"></span>
    </div>
  </div>
  <div id="status">Loading...</div>
  <div id="hint">Tap to enter fullscreen</div>

  <div id="overlay">
    <div id="overlayInner">
      <div id="overlayTitle">More From NovaPlay</div>
      <div id="overlayList"></div>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search)
const rawId = String(params.get("id") || "").trim()
const autoFullscreen = params.get("fs") === "1"
const playerEl = document.getElementById("player")
const statusEl = document.getElementById("status")
const hintEl = document.getElementById("hint")
const titleEl = document.getElementById("title")
const overlayEl = document.getElementById("overlay")
const overlayListEl = document.getElementById("overlayList")
let ytPlayer = null

function showStatus(msg){ statusEl.textContent = msg || "" }
function hideStatus(){ statusEl.textContent = "" }
function setTitle(text){ titleEl.textContent = text ? `- ${text}` : "" }

function isYouTubeStyleId(value){ return /^[A-Za-z0-9_-]{11}$/.test(String(value || "")) }
function getThumbnail(video){
  if (video.thumbnailUrl) return video.thumbnailUrl
  if (video.videoId) return `https://img.youtube.com/vi/${video.videoId}/mqdefault.jpg`
  return ""
}

async function fetchJson(url, timeoutMs = 8000){
  const controller = new AbortController()
  const timeout = setTimeout(() => controller.abort(), timeoutMs)
  const res = await fetch(url, { signal: controller.signal })
  clearTimeout(timeout)
  const data = await res.json().catch(() => ({}))
  if (!res.ok) throw new Error(data.error || "Request failed")
  return data
}

function requestFullscreen(target){
  if (!target) return false
  const req = target.requestFullscreen || target.webkitRequestFullscreen || target.msRequestFullscreen
  if (!req) return false
  try {
    const res = req.call(target)
    if (res && typeof res.catch === "function") res.catch(() => undefined)
    return true
  } catch { return false }
}

function scheduleFullscreen(target){
  if (!autoFullscreen) return
  hintEl.style.display = "block"
  const handler = () => {
    hintEl.style.display = "none"
    requestFullscreen(target)
    document.removeEventListener("click", handler, true)
    document.removeEventListener("keydown", handler, true)
  }
  document.addEventListener("click", handler, true)
  document.addEventListener("keydown", handler, true)
}

function enterFullscreen(target){
  if (!autoFullscreen) return
  if (!requestFullscreen(target)) scheduleFullscreen(target)
}

function showOverlay(list){
  if (!Array.isArray(list) || list.length === 0) return
  overlayListEl.innerHTML = ""
  list.slice(0, 8).forEach(video => {
    const item = document.createElement("div")
    item.className = "overlayItem"
    item.addEventListener("click", () => {
      const vid = String(video.id || video._id || "").trim()
      if (!vid) return
      location.href = `/watch.html?id=${encodeURIComponent(vid)}&fs=1`
    })

    const img = document.createElement("img")
    img.src = getThumbnail(video) || ""
    img.alt = video.title || "Video"

    const meta = document.createElement("div")
    meta.className = "overlayMeta"
    meta.textContent = video.title || "NovaPlay"

    item.appendChild(img)
    item.appendChild(meta)
    overlayListEl.appendChild(item)
  })
  overlayEl.classList.add("show")
}

async function loadRecommendations(){
  try {
    const list = await fetchJson("/api/videos/trending")
    if (Array.isArray(list)) return list
  } catch {}
  try {
    const list = await fetchJson("/api/videos")
    if (Array.isArray(list)) return list
  } catch {}
  return []
}

function renderIframe(src){
  playerEl.innerHTML = ""
  const iframe = document.createElement("iframe")
  iframe.src = src
  iframe.allowFullscreen = true
  iframe.setAttribute("allow", "autoplay; fullscreen")
  playerEl.appendChild(iframe)
  enterFullscreen(iframe)
}

function renderNative(src){
  playerEl.innerHTML = ""
  const video = document.createElement("video")
  video.controls = true
  video.autoplay = true
  video.playsInline = true
  video.src = src
  video.addEventListener("ended", async () => {
    const list = await loadRecommendations()
    showOverlay(list)
  })
  playerEl.appendChild(video)
  enterFullscreen(video)
}

function loadYouTubeApi(){
  if (window.YT && window.YT.Player) return Promise.resolve()
  return new Promise(resolve => {
    const tag = document.createElement("script")
    tag.src = "https://www.youtube.com/iframe_api"
    window.onYouTubeIframeAPIReady = () => resolve()
    document.head.appendChild(tag)
  })
}

async function renderYouTube(videoId){
  playerEl.innerHTML = "<div id=\"ytplayer\"></div>"
  await loadYouTubeApi()
  ytPlayer = new YT.Player("ytplayer", {
    videoId,
    playerVars: {
      autoplay: 1,
      rel: 0,
      modestbranding: 1,
      iv_load_policy: 3,
      playsinline: 1
    },
    events: {
      onReady: () => {
        const iframe = playerEl.querySelector("iframe")
        enterFullscreen(iframe || playerEl)
      },
      onStateChange: async (event) => {
        if (event.data === YT.PlayerState.ENDED) {
          const list = await loadRecommendations()
          showOverlay(list)
        }
      }
    }
  })
}

async function resolveVideo(){
  try {
    const list = await fetchJson("/api/videos")
    if (Array.isArray(list)) {
      if (rawId) {
        const match = list.find(v => String(v.id) === rawId || String(v._id) === rawId)
        if (match) return match
      }
      const first = list.find(v => v.id || v._id)
      if (first) return first
    }
  } catch (err) {
    showStatus(`API error: ${err.message}`)
  }
  return null
}

async function init(){
  showStatus("Loading...")
  const video = await resolveVideo()
  if (!video) {
    showStatus(rawId ? `Video not found for id: ${rawId}` : "No videos available")
    return
  }

  setTitle(video.title || "")
  const source = String(video.source || "local").toLowerCase()
  const vid = String(video.videoId || "")

  if (isYouTubeStyleId(vid)) {
    await renderYouTube(vid)
    hideStatus()
    return
  }
  if (source === "vimeo" && vid) {
    renderIframe(`https://player.vimeo.com/video/${vid}`)
    hideStatus()
    return
  }
  if (source === "dailymotion" && vid) {
    renderIframe(`https://www.dailymotion.com/embed/video/${vid}`)
    hideStatus()
    return
  }
  if (video.playbackUrl) {
    renderNative(video.playbackUrl)
    hideStatus()
    return
  }

  showStatus("Unable to play video")
}

init()
</script>
</body>
</html>
